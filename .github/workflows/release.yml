name: Publish to PyPI

# Publishes the repopact distribution to PyPI via Trusted Publishing (OIDC) — no
# stored API token. Fires when a GitHub release is published, and can be run manually.
# Requires a PyPI trusted publisher (or pending publisher) configured for this repo:
#   project: repopact | owner: ForgeWireLabs | repo: repopact
#   workflow: release.yml | environment: pypi
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
