<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 561 488" width="561" height="488" role="img" aria-label="repopact - governance terminal output">
  <defs><style>
    text{font-family:'Cascadia Code','SF Mono','Consolas','Liberation Mono',monospace;font-size:15px;white-space:pre;}
    .base{fill:#c3ccd9;} .ok{fill:#34d399;} .warn{fill:#fbbf24;} .fail{fill:#f87171;}
    .prompt{fill:#34d399;font-weight:700;} .cmd{fill:#f1f5f9;font-weight:600;} .head{fill:#38bdf8;font-weight:700;} .dim{fill:#5b6b86;}
  </style></defs>
  <rect width="561" height="488" rx="12" fill="#0b1220"/>
  <rect width="561" height="40" rx="12" fill="#0e1729"/><rect y="28" width="561" height="12" fill="#0e1729"/>
  <circle cx="22" cy="20" r="6" fill="#f87171"/><circle cx="44" cy="20" r="6" fill="#fbbf24"/><circle cx="66" cy="20" r="6" fill="#34d399"/>
  <text x="280.5" y="25" text-anchor="middle" class="dim" style="font-size:13px">repopact - governance</text>
  <text x="28" y="56" xml:space="preserve" class="base"><tspan class="prompt">$</tspan> <tspan class="cmd">python scripts/validate_repo.py</tspan></text>
  <text x="28" y="80" xml:space="preserve" class="base">Repository governance validation <tspan class="ok">passed</tspan>.</text>
  <text x="28" y="104" xml:space="preserve" class="base"></text>
  <text x="28" y="128" xml:space="preserve" class="base"><tspan class="prompt">$</tspan> <tspan class="cmd">python scripts/generate_dashboard.py</tspan></text>
  <text x="28" y="152" xml:space="preserve" class="base"><tspan class="ok">Generated</tspan> audits/reports/dashboard.md</text>
  <text x="28" y="176" xml:space="preserve" class="base"></text>
  <text x="28" y="200" xml:space="preserve" class="base"><tspan class="prompt">$</tspan> <tspan class="cmd">cat audits/reports/dashboard.md</tspan></text>
  <text x="28" y="224" xml:space="preserve" class="base"><tspan class="head"># Repository Dashboard</tspan></text>
  <text x="28" y="248" xml:space="preserve" class="base">  Generated from source records - spec 1.0.0</text>
  <text x="28" y="272" xml:space="preserve" class="base"></text>
  <text x="28" y="296" xml:space="preserve" class="base">  Invariants ............ 7      Decision records ... 3</text>
  <text x="28" y="320" xml:space="preserve" class="base">  Frozen-surface ........ 4      Policy records ..... 1</text>
  <text x="28" y="344" xml:space="preserve" class="base">  Scope contracts ....... 2      Evidence runs ...... 7</text>
  <text x="28" y="368" xml:space="preserve" class="base">  Audit findings ........ 1</text>
  <text x="28" y="392" xml:space="preserve" class="base"></text>
  <text x="28" y="416" xml:space="preserve" class="base">  Work:  active 0 - blocked 0 - deferred 0 - completed 4</text>
  <text x="28" y="440" xml:space="preserve" class="base">  Audit freshness:  all scopes within review cadence</text>
</svg>
